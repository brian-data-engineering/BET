name: Lucra Auto-Scraper

on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch: 

jobs:
  scrape-job:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # This ensures it pulls the absolute latest code from your root
          fetch-depth: 0 

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Debug - List Files
        # This will show us EXACTLY where scraper.py is hiding in the logs
        run: |
          echo "Current Directory: $(pwd)"
          ls -R

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install psycopg2-binary requests httpx; fi

      - name: Run Lucra Scraper
        # We use './' to tell Linux "look right here in the folder you just landed in"
        run: python ./scraper.py
