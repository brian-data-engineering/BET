name: Lucra Auto-Scraper

on:
  schedule:
    - cron: '*/15 * * * *' # Changed to 15m to safely stay under your 100-req/hr limit
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install supabase requests upstash-redis

      - name: Run Lucra Scrapers
        env:
          # Supabase Secrets (For the new Parallel Tables)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # Odds API Secret
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          
          # Upstash Redis Secrets (Keep these for your existing speed logic)
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          # 1. Sync Odds to the new api_ tables (The 100-req/hr part)
          python sync_live_fast.py
          
          # 2. Run your existing Prematch scraper
          python scraper.py
