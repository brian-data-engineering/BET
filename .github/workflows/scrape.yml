name: Lucra Auto-Scraper

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 mins (Safety first for 100/hr limit)
  workflow_dispatch: 

jobs:
  scrape-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev
          pip install supabase requests upstash-redis psycopg2-binary websockets

      - name: Run Lucra Scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          # Priority 1: New API Sync
          python sync_live_fast.py
          # Priority 2: Old Scraper
          python scraper.py
