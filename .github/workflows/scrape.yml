name: Lucra Auto-Scraper

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 mins (Safely under 100/hr limit)
  workflow_dispatch: # Allows manual testing

jobs:
  scrape-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev
          # Note: Keeping psycopg2-binary just in case, but websockets is added
          pip install supabase requests upstash-redis psycopg2-binary websockets

      - name: Run Lucra Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          # Only running the new, clean API sync
          python sync_live_fast.py
