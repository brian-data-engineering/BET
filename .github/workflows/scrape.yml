name: Lucra Auto-Scraper

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 mins
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  scrape-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # We only need Python and the basic API libraries now
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install supabase requests

      - name: Run Lucra API Sync
        env:
          # These must match the names in your GitHub Settings > Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          # We are ONLY running the new API logic
          python sync_live_fast.py
