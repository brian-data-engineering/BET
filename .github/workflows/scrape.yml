name: Lucra Auto-Scraper

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual run from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    # Setting ENV here makes them available to all steps in this job
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase aiohttp

      - name: 1. Sync Main Events
        # This script populates api_events and provides the parent_id
        run: python sync_events.py

      - name: 2. Sync Deep Odds (Football)
        # This runs immediately after and fills api_event_details
        run: python sync_deep_odds.py
