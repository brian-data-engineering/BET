name: Lucra Auto-Scraper

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes (GitHub Free Limit)
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scrape-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install psycopg2-binary requests upstash-redis

      - name: Run Lucra Scrapers
        env:
          # Supabase Secret
          DATABASE_URL: ${{ secrets.SUPABASE_URL }}
          # Upstash Redis Secrets
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          # Run the Live scraper first (Speed is priority)
          python sync_live_fast.py
          # Then run the Prematch scraper
          python scraper.py
