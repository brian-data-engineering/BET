name: Lucra Auto-Scraper

on:
  schedule:
    # Runs every 15 minutes to stay safe within GitHub's free 2000-minute limit
    - cron: '*/15 * * * *' 
  workflow_dispatch: # This allows you to click "Run workflow" manually

jobs:
  scrape-job:
    runs-on: ubuntu-latest
    
    env:
      # This removes the yellow "Node.js 20" warning you saw
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # This connects your Supabase URI from GitHub Secrets to your Python script
      DATABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # This caches your libraries so the scraper starts faster each time
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lucra Scraper
        run: python scraper.py
