name: Lucra Team Name Mapper

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour to catch new bets
  workflow_dispatch:      # Allows you to click "Run workflow" manually in GitHub

jobs:
  map-teams:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Run Team Mapper
        env:
          # These must be added to your GitHub Repository Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python lucra_team_mapper.py
