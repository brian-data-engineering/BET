name: Lucra Deep Odds Sync

on:
  schedule:
    # Runs every 30 minutes (Adjust as needed)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  sync-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp supabase

      - name: Run Multi-Sport Sync
        env:
          # These must be set in your GitHub Repository Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python bti.py
