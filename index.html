<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Lucra | Live Sync</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg: #0b1624; --card: #152233; --accent: #00ff66; --odd: #233245; --blue: #3b82f6; --yellow: #ffcc00; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* High Density Row - matches image_131a02.png */
        .match-row { background: var(--card); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 4px; padding: 10px 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
        .odd-btn { background: var(--odd); border-radius: 6px; width: 54px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; transition: 0.1s; }
        .odd-btn.selected { background: var(--blue) !important; }
        
        /* Modal & Footer styling from image_1395bb.png */
        .modal-sheet { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #market-modal.active .modal-sheet { transform: translateY(0); }
        .nav-dock { background: #0f1c2e; border-top: 1px solid rgba(255,255,255,0.1); height: 65px; }
        .fab-slip { background: var(--yellow); width: 54px; height: 54px; border-radius: 50%; position: relative; top: -18px; border: 4px solid var(--bg); display: flex; align-items: center; justify-content: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-[#00ff66] text-black py-1.5 px-4 flex justify-between items-center text-[10px] font-black uppercase sticky top-0 z-[100]">
        <span>Lucra Live DB Connected</span>
        <span class="underline">Refresh</span>
    </div>

    <div class="px-3">
        <header class="flex justify-between items-center py-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#00ff66] rounded flex items-center justify-center font-black text-black">L</div>
                <span class="font-black text-sm tracking-tighter">LUCRA</span>
            </div>
            <button class="bg-[#00ff66] text-black px-4 py-1.5 rounded-md font-bold text-xs">JOIN</button>
        </header>

        <div id="loader" class="text-center py-20 opacity-30 text-[10px] font-bold uppercase tracking-widest">Fetching Scrapped Data...</div>
        <div id="match-container" class="space-y-1"></div>
    </div>

    <div id="market-modal" class="fixed inset-0 z-[1000] hidden flex items-end">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="modal-sheet relative w-full bg-[#0b1624] rounded-t-3xl flex flex-col max-h-[85vh] border-t border-white/10">
            <div class="p-4 flex justify-between items-center bg-[#152233] rounded-t-3xl">
                <div>
                    <p id="m-league" class="text-[9px] text-[#00ff66] font-bold uppercase"></p>
                    <h2 id="m-teams" class="text-xs font-bold mt-1"></h2>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white text-lg">✕</button>
            </div>
            <div id="m-content" class="p-4 overflow-y-auto no-scrollbar pb-32"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 nav-dock flex justify-between items-center px-6 z-[900]">
        <div class="flex flex-col items-center gap-1 text-[#00ff66]">
            <span class="text-xl">🏠</span><span class="text-[8px] font-bold uppercase">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40 relative">
            <span class="bg-[#00ff66] text-black text-[7px] font-black px-1.5 rounded absolute -top-1 -right-2">9</span>
            <span class="text-xl">📺</span><span class="text-[8px] font-bold uppercase">Live</span>
        </div>
        <div onclick="alert('Slip Open')" class="fab-slip cursor-pointer shadow-xl">
            <span class="bg-red-500 text-white text-[8px] font-black px-1.5 rounded-full absolute -top-1 -right-1 border-2 border-[#0f1c2e]">1</span>
            <span class="text-black text-xl">📄</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">📋</span><span class="text-[8px] font-bold uppercase">My Bets</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">👤</span><span class="text-[8px] font-bold uppercase">Profile</span>
        </div>
    </nav>

    <script>
        let allMatches = [];
        let slip = [];

        async function fetchFromPython() {
            try {
                // This targets your index.py handler
                const res = await fetch('/api'); 
                const data = await res.json();
                
                // Map the Python RealDictCursor keys to UI keys
                allMatches = data.map(m => ({
                    id: m.id,
                    league: m.league_name || m.league || "Pro League",
                    home: m.home_team || m.home,
                    away: m.away_team || m.away,
                    h_odd: m.home_odds || m.h_odd || "1.00",
                    d_odd: m.draw_odds || m.d_odd || "1.00",
                    a_odd: m.away_odds || m.a_odd || "1.00",
                    time: m.start_date || "Today"
                }));

                document.getElementById('loader').classList.add('hidden');
                render();
            } catch (e) {
                document.getElementById('loader').innerText = "DB CONNECTION ERROR";
            }
        }

        function render() {
            const container = document.getElementById('match-container');
            container.innerHTML = allMatches.map(g => {
                const isS = (t) => slip.some(s => s.id === g.id && s.t === t);
                return `
                <div class="match-row">
                    <div class="flex-1 min-w-0 pr-4" onclick="openModal('${g.id}')">
                        <p class="text-[8px] text-gray-500 font-bold uppercase truncate mb-0.5">${g.league}</p>
                        <h3 class="text-[13px] font-bold truncate leading-tight">${g.home}</h3>
                        <h3 class="text-[13px] font-bold truncate leading-tight">${g.away}</h3>
                        <span class="text-[9px] text-[#00ff66] font-bold mt-1 inline-block">View Markets</span>
                    </div>
                    <div class="flex gap-1.5">
                        <button onclick="toggle('${g.id}','1','${g.h_odd}')" class="odd-btn ${isS('1')?'selected':''}">${g.h_odd}</button>
                        <button onclick="toggle('${g.id}','X','${g.d_odd}')" class="odd-btn ${isS('X')?'selected':''}">${g.d_odd}</button>
                        <button onclick="toggle('${g.id}','2','${g.a_odd}')" class="odd-btn ${isS('2')?'selected':''}">${g.a_odd}</button>
                    </div>
                </div>`;
            }).join('');
        }

        function toggle(id, t, o) {
            const i = slip.findIndex(s => s.id === id);
            if (i > -1 && slip[i].t === t) slip.splice(i, 1);
            else { if (i > -1) slip.splice(i, 1); slip.push({ id, t, o }); }
            render();
        }

        function openModal(id) {
            const g = allMatches.find(x => x.id == id);
            if(!g) return;
            document.getElementById('m-teams').innerText = `${g.home} vs ${g.away}`;
            document.getElementById('m-league').innerText = g.league;
            document.getElementById('m-content').innerHTML = `<div class="bg-white/5 p-4 rounded-xl text-center text-[10px] font-bold opacity-30">Loading Extra Markets...</div>`;
            const m = document.getElementById('market-modal');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.add('active'), 10);
        }

        function closeModal() {
            const m = document.getElementById('market-modal');
            m.classList.remove('active');
            setTimeout(() => m.classList.add('hidden'), 300);
        }

        fetchFromPython();
    </script>
</body>
</html>
