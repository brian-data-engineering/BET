<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Lucra | Prime Booking</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05080b; overflow-x: hidden; color: white; }
        
        .glass { background: rgba(22, 32, 44, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .bet-card { background: linear-gradient(145deg, #111a24, #0d141c); border: 1px solid #1f2937; }
        
        .odd-box { background: #1c2632; border: 1px solid #2d3b4d; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .odd-box.selected { background: #00ff66; border-color: #00ff66; color: #000; transform: scale(0.95); box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
        
        .neon-text { color: #00ff66; text-shadow: 0 0 10px rgba(0, 255, 102, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Modal Animation */
        .modal-overlay { transition: opacity 0.3s ease; background: rgba(0,0,0,0.8); }
        .modal-container { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); transform: translateY(100%); }
        #market-modal.active .modal-container { transform: translateY(0); }
        
        .tab-active { background: rgba(0, 255, 102, 0.1); border-color: #00ff66; color: #00ff66; }
    </style>
</head>
<body class="pb-32">

    <div class="bg-[#00ff66] text-black text-[10px] font-extrabold py-2 px-4 flex justify-between items-center sticky top-0 z-[100] tracking-widest">
        <span>LUCRA PRIME ENGINE v2.0</span>
        <span>LIVE DATABASE CONNECTED</span>
    </div>

    <div class="max-w-md mx-auto px-4">
        <header class="flex justify-between items-center py-6">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black italic neon-text tracking-tighter leading-none">LUCRA</h1>
                <span class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.2em]">Booking Only</span>
            </div>
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full border border-gray-800 flex items-center justify-center text-lg">🔍</div>
                <div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center relative">
                    <span class="absolute -top-1 -right-1 bg-red-500 w-3 h-3 rounded-full border-2 border-[#05080b]"></span>
                    🔔
                </div>
            </div>
        </header>

        <div class="flex gap-3 overflow-x-auto py-2 no-scrollbar mb-6">
            <button onclick="filterBySport('Soccer')" id="btn-Soccer" class="sport-filter tab-active border px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all">⚽ Soccer</button>
            <button onclick="filterBySport('Basketball')" id="btn-Basketball" class="sport-filter border border-gray-800 text-gray-500 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all">🏀 Basketball</button>
            <button onclick="filterBySport('Tennis')" id="btn-Tennis" class="sport-filter border border-gray-800 text-gray-500 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all">🎾 Tennis</button>
        </div>

        <div id="loader" class="text-center py-20">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#00ff66] mx-auto mb-4"></div>
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Fetching Matches...</p>
        </div>
        
        <div id="match-container" class="space-y-4"></div>
    </div>

    <div id="market-modal" class="fixed inset-0 z-[1000] hidden">
        <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
        <div class="modal-container glass absolute bottom-0 left-0 right-0 rounded-t-[2.5rem] flex flex-col max-h-[90vh]">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto my-4"></div>
            <div class="p-6 pt-0 border-b border-white/5">
                <p id="modal-league" class="text-[#00ff66] text-[10px] font-black uppercase tracking-widest mb-1"></p>
                <h2 id="modal-teams" class="text-xl font-extrabold leading-tight"></h2>
            </div>
            <div id="modal-content" class="p-6 overflow-y-auto space-y-8 pb-20 no-scrollbar">
                </div>
        </div>
    </div>

    <div id="bet-slip-drawer" class="fixed bottom-0 left-0 right-0 glass border-t-2 border-[#00ff66] transform translate-y-full transition-transform duration-500 z-[900]">
        <div class="p-6 max-w-md mx-auto">
            <div class="flex justify-between items-end mb-6">
                <h3 class="font-black text-white text-lg uppercase tracking-tighter">Your Ticket</h3>
                <span id="slip-odds-count" class="text-[10px] font-bold text-gray-400 bg-white/5 px-2 py-1 rounded">0 SELECTIONS</span>
            </div>
            <div id="slip-items" class="space-y-3 max-h-60 overflow-y-auto mb-6 no-scrollbar"></div>
            <div class="flex justify-between items-center mb-6 bg-white/5 p-4 rounded-2xl">
                <span class="text-gray-400 text-xs font-bold uppercase">Total Odds</span>
                <span id="total-odds" class="neon-text font-black text-2xl">1.00</span>
            </div>
            <button onclick="bookBet()" class="w-full bg-[#00ff66] text-black font-black py-5 rounded-2xl uppercase tracking-widest text-sm shadow-[0_10px_30px_rgba(0,255,102,0.2)] active:scale-95 transition-all">Generate Booking Code</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#05080b]/90 backdrop-blur-md border-t border-white/5 py-4 px-8 flex justify-between items-end z-[800]">
        <div class="flex flex-col items-center gap-1">
            <span class="text-xl neon-text">🏠</span>
            <span class="text-[9px] font-black neon-text uppercase">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 relative opacity-40">
            <span class="absolute -top-1 -right-2 bg-[#00ff66] text-black text-[8px] font-black px-1.5 rounded-full">12</span>
            <span class="text-xl">🖥️</span>
            <span class="text-[9px] font-black uppercase">Live</span>
        </div>
        <div onclick="toggleSlip()" class="relative -top-6 bg-[#00ff66] w-16 h-16 rounded-[2rem] flex items-center justify-center shadow-[0_10px_25px_rgba(0,255,102,0.4)] cursor-pointer active:scale-90 transition-all">
            <span id="slip-badge" class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-black px-2 py-0.5 rounded-full border-2 border-[#05080b] hidden">0</span>
            <span class="text-black text-2xl">📑</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">📋</span>
            <span class="text-[9px] font-black uppercase">History</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">👤</span>
            <span class="text-[9px] font-black uppercase">Account</span>
        </div>
    </nav>

    <script>
        let allMatches = [];
        let betSlip = [];

        function toggleSlip() {
            document.getElementById('bet-slip-drawer').classList.toggle('translate-y-full');
        }

        function openExtraMarkets(p_id) {
            const match = allMatches.find(m => m.p_id === p_id);
            if(!match) return;

            const modal = document.getElementById('market-modal');
            const content = document.getElementById('modal-content');
            
            document.getElementById('modal-teams').innerText = `${match.home} vs ${match.away}`;
            document.getElementById('modal-league').innerText = match.league;

            const markets = typeof match.all_markets === 'string' ? JSON.parse(match.all_markets) : match.all_markets;
            
            content.innerHTML = (markets && markets.length > 0) ? markets.map(market => `
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <div class="h-1 w-6 bg-[#00ff66] rounded-full"></div>
                        <p class="text-[11px] text-gray-400 uppercase font-black tracking-widest">${market.name}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        ${market.odds.map(o => {
                            const isSel = betSlip.some(b => b.matchId === match.p_id && b.selection === o.display && b.market === market.name);
                            return `
                            <div onclick="addToSlip('${match.p_id}', '${match.home} vs ${match.away}', '${market.name}', '${o.odd_value}', '${o.display}')" 
                                 class="odd-box p-4 rounded-2xl flex justify-between items-center ${isSel ? 'selected' : ''}">
                                <span class="text-[11px] font-bold ${isSel ? 'text-black' : 'text-gray-400'}">${o.display}</span>
                                <span class="text-xs font-black ${isSel ? 'text-black' : 'neon-text'}">${o.odd_value}</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('') : '<p class="text-gray-600 text-center py-10">Searching deep markets...</p>';

            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('market-modal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        function addToSlip(matchId, teams, market, odd, selection) {
            // THE FIX: Check if match is already in slip
            const existingMatchIndex = betSlip.findIndex(item => item.matchId === matchId);
            
            // Check if user clicked the exact same bet (Toggle off)
            const exactSameBet = existingMatchIndex > -1 && 
                               betSlip[existingMatchIndex].selection === selection && 
                               betSlip[existingMatchIndex].market === market;

            if (exactSameBet) {
                betSlip.splice(existingMatchIndex, 1);
            } else {
                // If match exists but different selection, replace it (One pick per game)
                if (existingMatchIndex > -1) {
                    betSlip.splice(existingMatchIndex, 1);
                }
                betSlip.push({ matchId, teams, market, odd: parseFloat(odd), selection });
            }
            
            updateSlipUI();
            
            // Refresh visuals
            const currentSport = document.querySelector('.sport-filter.tab-active').id.replace('btn-', '');
            renderMatches(allMatches.filter(m => m.sport === currentSport));
            
            if(!document.getElementById('market-modal').classList.contains('hidden')) {
                openExtraMarkets(matchId);
            }
        }

        function updateSlipUI() {
            const container = document.getElementById('slip-items');
            const badge = document.getElementById('slip-badge');
            const oddsEl = document.getElementById('total-odds');
            const countEl = document.getElementById('slip-odds-count');
            
            badge.innerText = betSlip.length;
            badge.classList.toggle('hidden', betSlip.length === 0);
            countEl.innerText = `${betSlip.length} SELECTIONS`;
            
            if (betSlip.length === 0) {
                container.innerHTML = '<div class="text-center py-8"><p class="text-gray-600 text-xs font-bold uppercase tracking-widest">Slip is empty</p></div>';
                oddsEl.innerText = '1.00';
                return;
            }

            container.innerHTML = betSlip.map(item => `
                <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <p class="text-[11px] font-black text-white leading-tight">${item.selection}</p>
                        <p class="text-[9px] text-gray-500 font-bold mt-0.5">${item.teams}</p>
                        <p class="text-[8px] text-[#00ff66] font-black uppercase tracking-tighter mt-1">${item.market}</p>
                    </div>
                    <span class="neon-text font-black text-sm">${item.odd.toFixed(2)}</span>
                </div>
            `).join('');

            const total = betSlip.reduce((sum, item) => sum * item.odd, 1).toFixed(2);
            oddsEl.innerText = total;
        }

        function bookBet() {
            if (betSlip.length === 0) return;
            const code = Math.random().toString(36).substring(2, 9).toUpperCase();
            
            // Cool custom alert replacement
            const result = confirm(`BOOKING CREATED: ${code}\nTotal Odds: ${document.getElementById('total-odds').innerText}\n\nClick OK to copy code.`);
            if(result) {
                navigator.clipboard.writeText(code);
            }
            
            betSlip = [];
            updateSlipUI();
            toggleSlip();
            renderMatches(allMatches.filter(m => m.sport === document.querySelector('.sport-filter.tab-active').id.replace('btn-', '')));
        }

        async function fetchMatches() {
            try {
                const res = await fetch('/api');
                allMatches = await res.json();
                document.getElementById('loader').classList.add('hidden');
                filterBySport('Soccer');
            } catch (e) { 
                document.getElementById('loader').innerHTML = "<p class='text-red-500 font-bold'>OFFLINE: Connect to DB</p>";
            }
        }

        function renderMatches(matchesToDisplay) {
            const container = document.getElementById('match-container');
            container.innerHTML = matchesToDisplay.map(m => {
                const checkSel = (sel) => betSlip.some(b => b.matchId === m.p_id && b.selection === sel);
                
                return `
                <div class="bet-card rounded-[2rem] p-5 shadow-xl">
                    <div class="flex justify-between items-start mb-5">
                        <div class="cursor-pointer" onclick="openExtraMarkets('${m.p_id}')">
                            <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest mb-2">${m.league}</p>
                            <h3 class="font-extrabold text-[15px] leading-tight mb-1">${m.home}</h3>
                            <h3 class="font-extrabold text-[15px] leading-tight">${m.away}</h3>
                            <div class="mt-3 flex items-center gap-2">
                                <span class="bg-[#00ff66]/10 text-[#00ff66] text-[9px] font-black px-2 py-1 rounded-lg">LIVE</span>
                                <span class="text-[10px] text-gray-500 font-bold">+${m.market_count} Markets</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div onclick="addToSlip('${m.p_id}', '${m.home} vs ${m.away}', 'Match Result', '${m.h_odd}', '1')" 
                             class="odd-box h-14 rounded-2xl flex flex-col items-center justify-center ${checkSel('1') ? 'selected' : ''}">
                            <span class="text-[9px] font-bold ${checkSel('1') ? 'text-black/60' : 'text-gray-500'}">1</span>
                            <span class="text-sm font-black">${m.h_odd || '-'}</span>
                        </div>
                        <div onclick="addToSlip('${m.p_id}', '${m.home} vs ${m.away}', 'Match Result', '${m.d_odd}', 'X')" 
                             class="odd-box h-14 rounded-2xl flex flex-col items-center justify-center ${checkSel('X') ? 'selected' : ''}">
                            <span class="text-[9px] font-bold ${checkSel('X') ? 'text-black/60' : 'text-gray-500'}">X</span>
                            <span class="text-sm font-black">${m.d_odd || '-'}</span>
                        </div>
                        <div onclick="addToSlip('${m.p_id}', '${m.home} vs ${m.away}', 'Match Result', '${m.a_odd}', '2')" 
                             class="odd-box h-14 rounded-2xl flex flex-col items-center justify-center ${checkSel('2') ? 'selected' : ''}">
                            <span class="text-[9px] font-bold ${checkSel('2') ? 'text-black/60' : 'text-gray-500'}">2</span>
                            <span class="text-sm font-black">${m.a_odd || '-'}</span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function filterBySport(sport) {
            document.querySelectorAll('.sport-filter').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('border-gray-800', 'text-gray-500');
            });
            const btn = document.getElementById(`btn-${sport}`);
            if(btn) btn.classList.add('tab-active');
            renderMatches(allMatches.filter(m => m.sport === sport));
        }

        fetchMatches();
    </script>
</body>
</html>
