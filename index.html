<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Lucra | Elite Odds</title>
</head>
<body class="bg-[#0b0b0b] text-gray-100 font-sans">
    <div class="max-w-3xl mx-auto p-4">
        <header class="flex justify-between items-center py-6">
            <h1 class="text-2xl font-black text-[#00ff66] italic">LUCRA</h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Live Markets</span>
            </div>
        </header>

        <div id="loader" class="text-center py-20 text-gray-600">Syncing with Render DB...</div>
        <div id="match-container" class="space-y-3"></div>
    </div>

    <script>
        function toggleMarkets(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        }

        async function fetchMatches() {
            const res = await fetch('/api');
            const matches = await res.json();
            document.getElementById('loader').classList.add('hidden');
            const container = document.getElementById('match-container');

            container.innerHTML = matches.map(m => `
                <div class="bg-[#141414] border border-gray-800 rounded-xl overflow-hidden shadow-2xl">
                    <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-[#1a1a1a]" onclick="toggleMarkets('extra-${m.p_id}')">
                        <div class="flex-1">
                            <p class="text-[9px] text-[#00ff66] font-bold uppercase tracking-tighter mb-1">${m.league}</p>
                            <h3 class="font-bold text-sm md:text-base">${m.home} vs ${m.away}</h3>
                            <p class="text-[10px] text-gray-500 mt-1">${new Date(m.start_date).toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2">
                            ${[m.h_odd, m.d_odd, m.a_odd].map((odd, i) => `
                                <div class="bg-[#1e1e1e] w-12 h-10 rounded border border-gray-700 flex flex-col items-center justify-center">
                                    <span class="text-[8px] text-gray-500 uppercase">${['1','X','2'][i]}</span>
                                    <span class="text-[#00ff66] font-bold text-xs">${odd}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="ml-3 text-gray-600 text-xs tracking-tighter">+${m.market_count} ▾</div>
                    </div>
                    
                    <div id="extra-${m.p_id}" class="hidden bg-[#0d0d0d] p-4 border-t border-gray-800">
                        <p class="text-[9px] text-gray-500 mb-3 border-b border-gray-800 pb-1 uppercase tracking-widest">Additional Markets</p>
                        <div class="grid grid-cols-2 gap-2 text-center text-xs">
                           <div class="bg-[#1a1a1a] p-2 rounded text-gray-400">Deep Markets Loading...</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        fetchMatches();
    </script>
</body>
</html>
