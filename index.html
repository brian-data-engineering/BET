<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Lucra | Pro Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --bg: #0b1624; --card: #152233; --acc: #00ff66; --odd: #233245; --sel: #3b82f6; --ylw: #ffcc00; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* High Density Row - Matches image_131a02.png */
        .match-row { background: var(--card); border: 1px solid rgba(255,255,255,0.03); margin-bottom: 4px; padding: 10px 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
        .odd-btn { background: var(--odd); border-radius: 6px; width: 54px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; transition: 0.1s; }
        .odd-btn.active { background: var(--acc) !important; color: black; }
        
        /* Footer & FAB - Matches image_1395bb.png */
        .nav-dock { background: #0f1c2e; border-top: 1px solid rgba(255,255,255,0.1); height: 65px; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .fab-slip { background: var(--ylw); width: 56px; height: 56px; border-radius: 50%; position: relative; top: -18px; border: 4px solid var(--bg); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        .chip { background: rgba(255,255,255,0.05); padding: 7px 15px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; border: 1px solid transparent; }
        .chip.active { background: rgba(0,255,102,0.1); border-color: var(--acc); color: var(--acc); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-[#00ff66] text-black py-1.5 px-4 flex justify-between items-center text-[10px] font-black uppercase sticky top-0 z-[1100]">
        <span>Paybill 562424 • Lucra Engine Live</span>
        <span class="underline">Deposit</span>
    </div>

    <div class="px-3">
        <header class="flex justify-between items-center py-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#00ff66] rounded flex items-center justify-center font-black text-black">L</div>
                <span class="font-bold text-sm">Sign In</span>
            </div>
            <button class="bg-[#00ff66] text-black px-4 py-1.5 rounded-md font-bold text-[11px] uppercase">Sign Up</button>
        </header>

        <div class="flex gap-2 overflow-x-auto no-scrollbar mb-4">
            <button class="chip active">⚽ Soccer</button>
            <button class="chip">🏀 Basketball</button>
            <button class="chip">🎾 Tennis</button>
            <button class="chip">🏉 Rugby</button>
        </div>

        <div class="flex justify-between px-3 mb-2 text-[9px] font-bold text-gray-500 uppercase tracking-widest">
            <span>Match Details</span>
            <div class="flex gap-11 mr-5"><span>1</span><span>X</span><span>2</span></div>
        </div>

        <div id="loader" class="text-center py-20 opacity-30 text-[10px] font-bold uppercase tracking-widest">Syncing Scraper Data...</div>
        <div id="match-container" class="space-y-1"></div>
    </div>

    <nav class="nav-dock">
        <div class="flex flex-col items-center gap-1 text-[#00ff66]"><span class="text-xl">🏠</span><span class="text-[8px] font-bold uppercase">Home</span></div>
        <div class="flex flex-col items-center gap-1 opacity-40 relative">
            <span class="bg-[#00ff66] text-black text-[7px] font-black px-1.5 rounded absolute -top-1 -right-2">12</span>
            <span class="text-xl">📺</span><span class="text-[8px] font-bold uppercase">Live</span>
        </div>
        <div class="fab-slip" onclick="toggleSlip()"><span class="text-black text-xl">📄</span><div id="badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-[#0b1624] hidden">0</div></div>
        <div class="flex flex-col items-center gap-1 opacity-40"><span class="text-xl">📋</span><span class="text-[8px] font-bold uppercase">My Bets</span></div>
        <div class="flex flex-col items-center gap-1 opacity-40"><span class="text-xl">👤</span><span class="text-[8px] font-bold uppercase">Profile</span></div>
    </nav>

    <script>
        let allMatches = [];
        let slip = [];

        // Exact mapping from your Scraper's SQL structure
        async function fetchMatches() {
            try {
                const res = await fetch('/api'); 
                const data = await res.json();
                
                allMatches = data.map(m => ({
                    id: m.p_id,         // Mapping p_id from scraper
                    home: m.home,       // Mapping home from scraper
                    away: m.away,       // Mapping away from scraper
                    league: m.league,   // Mapping league from scraper
                    h_odd: m.h_odd,     // Mapping h_odd from scraper
                    d_odd: m.d_odd,     // Mapping d_odd from scraper
                    a_odd: m.a_odd,     // Mapping a_odd from scraper
                    time: m.start_date, // Mapping start_date from scraper
                    markets: m.market_count
                }));

                document.getElementById('loader').classList.add('hidden');
                render();
            } catch (e) {
                document.getElementById('loader').innerText = "CONNECTION FAILED";
            }
        }

        function render() {
            const container = document.getElementById('match-container');
            container.innerHTML = allMatches.map(g => {
                const isS = (t) => slip.some(s => s.id === g.id && s.type === t);
                return `
                <div class="match-row">
                    <div class="flex-1 min-w-0 pr-4">
                        <p class="text-[8px] text-gray-500 font-bold uppercase truncate mb-0.5">${g.league}</p>
                        <h3 class="text-[13px] font-bold truncate leading-tight">${g.home}</h3>
                        <h3 class="text-[13px] font-bold truncate leading-tight">${g.away}</h3>
                        <span class="text-[9px] text-[#00ff66] font-bold mt-1 inline-block">+${g.markets} Markets</span>
                    </div>
                    <div class="flex gap-1.5">
                        <button onclick="pick('${g.id}','1','${g.h_odd}')" class="odd-btn ${isS('1')?'active':''}"><span>${g.h_odd}</span></button>
                        <button onclick="pick('${g.id}','X','${g.d_odd}')" class="odd-btn ${isS('X')?'active':''}"><span>${g.d_odd}</span></button>
                        <button onclick="pick('${g.id}','2','${g.a_odd}')" class="odd-btn ${isS('2')?'active':''}"><span>${g.a_odd}</span></button>
                    </div>
                </div>`;
            }).join('');
        }

        function pick(id, type, odd) {
            const i = slip.findIndex(s => s.id === id);
            if (i > -1 && slip[i].type === type) slip.splice(i, 1);
            else { if (i > -1) slip.splice(i, 1); slip.push({ id, type, odd }); }
            
            const badge = document.getElementById('badge');
            badge.innerText = slip.length;
            slip.length > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
            render();
        }

        fetchMatches();
    </script>
</body>
</html>
